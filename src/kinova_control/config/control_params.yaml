# =============================================================================
# control_params.yaml
# Parameters for IK solver, motion executor, gripper, and state machine.
# =============================================================================
pick_and_place_node:
  ros__parameters:
    use_sim_time: true

    # ----- Robot URDF (for Pinocchio) -----
    # Will be loaded from robot_description parameter at runtime

    # ----- IK Solver -----
    ik:
      max_iterations: 300
      tolerance: 0.002
      damping_lambda: 0.0001
      step_size: 0.5

    # ----- Motion Execution -----
    motion:
      interpolation_steps: 8
      waypoint_duration: 0.8        # seconds per waypoint transition
      slow_duration: 0.8            # seconds for grasp/place approach
      transit_height: 0.35          # Z height for safe lateral moves (base frame)

    # ----- Gripper Control -----
    gripper:
      open_position: 0.0            # fully open
      close_position: 0.82          # fully closed for empty-grasp detection (with safety margin)
      max_effort: 100.0
      wait_after_command: 0.5       # seconds to wait after gripper command

    # ----- Grasp Verification -----
    grasp:
      finger_min_expected: 0.15     # min finger pos when cube is held
      finger_max_expected: 0.75     # max finger pos when cube is held (empirically achievable with contact)
      position_tolerance: 0.05      # meters — cube "gone from table" tolerance
      required_checks: 1            # only finger-gap check needed

    # ----- Drop Detection -----
    drop:
      check_interval: 0.5           # seconds between finger position checks
      finger_min_threshold: 0.1     # below this = cube dropped (fingers too open)
      finger_max_threshold: 0.84    # above this = cube dropped (fingers fully closed)

    # ----- Waypoint Offsets (relative to cube/container positions) -----
    # IK now targets tool_frame (fingertip) directly — no TCP offset needed
    offsets:
      pre_grasp_z: 0.05
      grasp_z: -0.015               # 15mm below cube top for side contact
      post_grasp_z: 0.08
      pre_place_z: 0.10
      drop_height: 0.07              # height above container to open gripper and drop cube

    # ----- Arm Joint Names -----
    arm_joint_names:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    # ----- Gripper Joint Names -----
    gripper_joint_names:
      - right_finger_bottom_joint
      - right_finger_tip_joint
      - left_finger_bottom_joint
      - left_finger_tip_joint
