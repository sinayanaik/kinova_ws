# =============================================================================
# controllers.yaml
# ros2_control configuration for the Kinova Gen3 Lite in Gazebo simulation.
# Defines: joint_state_broadcaster, joint_trajectory_controller (6 arm joints),
# and gripper_controller (right_finger_bottom_joint — mimic handles the rest).
# =============================================================================
controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    joint: right_finger_bottom_joint
    action_monitor_rate: 20.0
