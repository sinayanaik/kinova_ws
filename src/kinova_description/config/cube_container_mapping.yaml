# =============================================================================
# cube_container_mapping.yaml
# Maps each cube color to its target container and world-frame position.
# `container_position` is the actual tray interior center in world frame.
# Each tray also exposes two placement slots so cubes are not dropped on top
# of each other.
# =============================================================================
cube_container_mapping:
  red:
    target_container: red_container
    container_position: [0.38, -0.15, 0.755]
    slot_offsets:
      - [0.0, -0.022, 0.0]
      - [0.0,  0.022, 0.0]
    num_cubes: 2

  green:
    target_container: green_container
    container_position: [0.38, 0.15, 0.755]
    slot_offsets:
      - [0.0, -0.022, 0.0]
      - [0.0,  0.022, 0.0]
    num_cubes: 2

  yellow:
    target_container: yellow_container
    container_position: [0.38, 0.0, 0.755]
    slot_offsets:
      - [0.0, -0.022, 0.0]
      - [0.0,  0.022, 0.0]
    num_cubes: 2

# Cube initial positions (world frame, matching SDF — 0.035m cubes)
# Single row at x=0.18, 8cm spacing, interleaved colors: R,Y,G,R,G,Y
cube_positions:
  red_1:    [0.18, -0.20, 0.7675]
  yellow_1: [0.18, -0.12, 0.7675]
  green_1:  [0.18, -0.04, 0.7675]
  red_2:    [0.18,  0.04, 0.7675]
  green_2:  [0.18,  0.12, 0.7675]
  yellow_2: [0.18,  0.20, 0.7675]
