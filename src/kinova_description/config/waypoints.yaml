# =============================================================================
# waypoints.yaml
# Named waypoints for the Kinova Gen3 Lite pick-and-place state machine.
# All positions in meters, in WORLD FRAME.
# The robot base is at (0, 0, 0.75) in world frame.
# Table surface is at z=0.75.
# =============================================================================
waypoints:
  home:
    # Straight up above the robot base, safe starting position
    joint_angles: [0.0, -0.35, 1.4, 0.0, -1.05, 0.0]
    description: "Elbow-up home pose via joint angles"

  observe:
    # Above table center, looking down at cubes
    joint_angles: [0.0, 0.0, 1.57, 0.0, -1.57, 0.0]
    description: "Observation pose - arm extended over table"

  transit_height_z: 1.05  # Safe Z in world frame for transit (30cm above table)

  pre_grasp_offset: 0.08    # Height above cube for pre-grasp approach
  grasp_offset: 0.02        # Height above table for grasp contact
  post_grasp_height: 0.12   # Lift height after grasping
  pre_place_height: 0.20    # Height above container for approach
  place_offset: 0.06        # Height inside container for release
